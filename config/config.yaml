# HTTP 服务配置
server:
    # HTTP 服务监听地址。0.0.0.0 表示监听所有网卡
    # 可选配置：具体 IPv4/IPv6 地址或主机名
    # 默认配置：0.0.0.0
    address: "0.0.0.0"
    # HTTP 服务监听端口
    # 可选配置：1-65535 的端口号
    # 默认配置：36900
    port: 36900
    # 服务运行目录。相对路径按本地运行目录解析，绝对路径按绝对路径使用
    # 可选配置：任意存在或可创建的目录路径
    # 默认配置：./app
    dir: "./app"

# 日志配置
log:
    # 日志文件目录。相对路径按 server.dir 解析，绝对路径按绝对路径使用
    # 默认配置：log
    dir: "log"
    # 日志文件名
    # 默认配置：cephtower.log
    file: "cephtower.log"
    # 日志输出模式
    # 可选配置：stdout（标准输出）、file（日志文件）、both（标准输出和日志文件）
    # 默认配置：both
    output: "both"
    # 日志级别，级别越低输出越详细
    # 可选配置：debug、info、warn、error
    # 默认配置：info
    level: "info"
    # 日志输出格式
    # 可选配置：txt（文本格式）、json（JSON 格式）
    # 默认配置：txt
    format: "txt"
    # 日志轮转周期，按本地时间零点轮转，支持 day、week、month 及其复数形式
    # 默认配置：7days；周期到达后当前日志改名为带时间后缀的历史文件
    rotation: "7days"
    # 历史日志保留时间，超过该时间的历史文件会被自动删除
    # 默认配置：70days
    retention: "70days"

# 运行时文件配置。相对路径按 server.dir 解析
runtime:
    # Ceph 配置、keyring 等运行时文件的存储目录
    # 默认路径：data/runtime；实际路径为 server.dir/data/runtime
    dir: "data/runtime"

# 数据库配置。服务启动时会自动执行数据库表结构迁移
database:
    # 数据库类型
    # 可选配置：sqlite、mysql
    # 默认配置：sqlite
    engine: "sqlite"

    # SQLite 数据库配置。engine 为 sqlite 时生效
    sqlite:
        # SQLite 数据库文件路径；父目录不存在时会自动创建
        # 可选配置：本地文件路径、:memory: 或 file: 开头的 SQLite DSN
        # 相对路径按 server.dir 解析，绝对路径按绝对路径使用
        # 程序默认配置：data/db/cephtower.db；实际路径为 server.dir/data/db/cephtower.db
        path: "data/db/cephtower.db"

    # MySQL 数据库配置。engine 为 mysql 时生效
    mysql:
        # MySQL 服务地址
        # 默认配置：127.0.0.1
        host: "127.0.0.1"
        # MySQL 服务端口
        # 默认配置：3306
        port: 3306
        # MySQL 登录用户名；使用 MySQL 时必填
        # 默认配置：空（无默认用户名）
        username: ""
        # MySQL 登录密码；使用 MySQL 时按实际账号填写
        # 默认配置：空
        password: ""
        # 要连接的数据库名称；使用 MySQL 时必填
        # 默认配置：空（无默认数据库）
        database: ""
        # MySQL 连接参数，多个参数使用 & 分隔
        # 可选配置：任意 go-sql-driver/mysql 支持的 URL 查询参数
        # 默认配置：charset=utf8mb4&parseTime=True&loc=Local
        params: "charset=utf8mb4&parseTime=True&loc=Local"

# SMTP 邮件配置，用于需要发送邮件的功能
# 当前版本未配置 SMTP 时不会自动补齐以下字段；请按邮件服务商要求填写
smtp:
    # SMTP 服务器地址
    # 默认配置：空（不启用邮件发送）
    host: ""
    # SMTP 服务器端口
    # 可选配置：按服务商填写，常见值为 25、465（SSL）或 587（STARTTLS）
    # 默认配置：当前示例为 587；若省略则程序值为 0
    port: 587
    # SMTP 登录用户名
    # 默认配置：空
    username: ""
    # SMTP 登录密码
    # 默认配置：空
    password: ""
    # 发件人地址（From）
    # 默认配置：空
    from: ""
